name: Build Firmware

on:
  workflow_dispatch:

jobs:
  build:
    name: "Build Firmware"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Build Environment"
        run: |
          echo "⚙️ Installing build tools..."
          sudo apt update
          sudo apt install -y git dpkg-dev
          echo "✅ Build tools installed"

      - name: "🔨 Build Firmware"
        run: |
          echo "🚀 Building Firmware"
          bash enuma-firmware_build.sh
          echo "✅ Firmware build completed"

      - name: "📤 Upload Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: firmware-xiaomi-enuma
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: "🏷️ Create GitHub Release"
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: firmware-latest
          name: "Firmware Enuma"
          body: |
            🧩 Firmware for Xiaomi Enuma
            
            --- 
            
            ### 📦 Package List
            - firmware-xiaomi-enuma.deb
          draft: false
          prerelease: false
          files: |
            *.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
