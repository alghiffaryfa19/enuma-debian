name: Build ModemManager

on:
  workflow_dispatch:

jobs:
  build:
    name: "Build ModemManager"
    runs-on: ubuntu-24.04-arm
    container: debian:trixie
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔧 Setup Build Environment"
        run: |
          echo "⚙️ Installing build tools..."
          apt update
          apt install -y build-essential git meson ninja-build pkg-config bash-completion systemd-dev libglib2.0-dev libgudev-1.0-dev libudev-dev libsystemd-dev libpolkit-gobject-1-dev libmbim-glib-dev libqrtr-glib-dev valac gobject-introspection libgirepository1.0-dev xsltproc libdbus-1-dev gettext
          echo "✅ Build tools installed"

      - name: "🔨 Build ModemManager"
        run: |
          echo "🚀 Building ModemManager"
          bash build_modemmanager.sh
          echo "✅ ModemManager build completed"

      - name: "📤 Upload Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: modemmanager-enuma
          path: "*.deb"
          retention-days: 7

      - name: "🏷️ Create GitHub Release"
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: modemmanager-latest
          name: "ModemManager Enuma Custom"
          body: |
            🧩 Custom ModemManager for Enuma
            
            --- 

            ### 📦 Package List
            - modemmanager-enuma.deb
          draft: false
          prerelease: false
          files: |
            *.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
