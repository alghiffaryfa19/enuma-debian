name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Version (default: 7.1)"
        required: true
        default: "7.1"

jobs:
  build:
    name: "Build Kernel v${{ github.event.inputs.kernel_version || '7.1' }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "💾 Set ccache cache"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-kernel-${{ github.event.inputs.kernel_version || '7.1' }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-kernel-${{ github.event.inputs.kernel_version || '7.1' }}-
            ${{ runner.os }}-ccache-kernel-

      - name: "🔧 Setup Build Environment"
        run: |
          echo "⚙️ Installing build tools..."
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld systemd-ukify systemd-boot-efi
          echo "✅ Build tools installed"

          mkdir -p /home/runner/.ccache

          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros

          echo "📊 Cache restore status: ${{ steps.cache-ccache.outputs.cache-hit }}"

      - name: "🔨 Build Kernel"
        id: build
        run: |
          echo "🚀 Building Kernel v${{ github.event.inputs.kernel_version || '7.1' }}"
          echo "💾 Cache status: ${{ steps.cache-ccache.outputs.cache-hit }}"

          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"

          bash enuma-kernel_build.sh "${{ github.event.inputs.kernel_version || '7.1' }}" "${{ github.workspace }}"

          echo "✅ Kernel build completed"
          echo "📊 Ccache stats:"
          ccache --show-stats --verbose | grep -E "(hit rate|cache hit|cache miss|max size)" || true

      - name: "📦 Collect Build Artifacts"
        id: collect_artifacts
        run: |
          echo "🔍 Finding build artifacts..."
          find . -name "*.deb" -type f | head -20

          echo "📁 Build artifacts list:"
          ls -la *.deb 2>/dev/null || echo "⚠️  No .deb files found"
          echo ""
          echo "📊 File size statistics:"
          du -h *.deb 2>/dev/null || echo "No artifact files found"

          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "📦 Found $PKG_COUNT packages"
          echo "pkg_count=$PKG_COUNT" >> $GITHUB_OUTPUT

      - name: "📤 Upload Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.kernel_version || '7.1' }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: Upload single boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_single.img
          path: ${{ github.workspace }}/boot_enuma_singleboot.img

      - name: Upload dual boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot_dual.img
          path: ${{ github.workspace }}/boot_enuma_dualboot.img

      - name: "🏷️ Create GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-${{ github.event.inputs.kernel_version || '7.1' }}
          name: "Kernel ${{ github.event.inputs.kernel_version || '7.1' }}"
          body: |
            🧩 Kernel ${{ github.event.inputs.kernel_version || '7.1' }}

            --- 

            ### 🔧 Build Information
            | Project | Details |
            |---------|---------|
            | Kernel Version | ${{ github.event.inputs.kernel_version || '7.1' }} |
            | Build Method | GitHub Actions Auto Build |

            --- 

            ### 📦 Package List
            - linux-xiaomi-enuma.deb
            - modem-userspace-enuma.deb
          draft: false
          prerelease: false
          files: |
            *.deb
            *.img
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
